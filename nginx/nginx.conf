events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    # HTTP - redirect to HTTPS + handle ACME challenge
    server {
        listen 80;
        server_name realstream.site www.realstream.site;

        # Let's Encrypt verification
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # Redirect all other HTTP traffic to HTTPS
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # HTTPS
    server {
        listen 443 ssl;
        server_name realstream.site www.realstream.site;

        ssl_certificate /etc/ssl/fullchain.pem;
        ssl_certificate_key /etc/ssl/privkey.pem;

        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;

        # Use Docker's internal DNS resolver for dynamic upstream resolution
        # This prevents 502s when containers restart and get new IPs
        resolver 127.0.0.11 valid=10s ipv6=off;
        resolver_timeout 5s;

        # Frontend
        location / {
            set $upstream_frontend http://frontend:3000;
            proxy_pass $upstream_frontend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
        }

        # Auth Service
        location /api/auth/ {
            set $upstream_auth http://auth-service:8081;
            rewrite ^/api/auth/?(.*) /$1 break;
            proxy_pass $upstream_auth;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_set_header X-Forwarded-Prefix /api/auth;
        }

        # Auth Service (exact match for /api/auth without trailing slash)
        location = /api/auth {
            set $upstream_auth http://auth-service:8081;
            rewrite ^/api/auth$ / break;
            proxy_pass $upstream_auth;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_set_header X-Forwarded-Prefix /api/auth;
        }

        # Content Service
        location /api/content/ {
            set $upstream_content http://content-service:8083;
            rewrite ^/api/content/?(.*) /$1 break;
            proxy_pass $upstream_content;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
        }

        location = /api/content {
            set $upstream_content http://content-service:8083;
            rewrite ^/api/content$ / break;
            proxy_pass $upstream_content;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
        }

        # Comment Service
        location /api/comments/ {
            set $upstream_comment http://comment-service:8084;
            rewrite ^/api/comments/?(.*) /$1 break;
            proxy_pass $upstream_comment;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
        }

        location = /api/comments {
            set $upstream_comment http://comment-service:8084;
            rewrite ^/api/comments$ / break;
            proxy_pass $upstream_comment;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
        }

        # Interaction Service
        location /api/interactions/ {
            set $upstream_interaction http://interaction-service:8085;
            proxy_pass $upstream_interaction$request_uri;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
        }

        location = /api/interactions {
            set $upstream_interaction http://interaction-service:8085;
            proxy_pass $upstream_interaction$request_uri;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
        }

        # User Service
        location /api/users/ {
            set $upstream_user http://user-service:8082;
            rewrite ^/api/users/?(.*) /$1 break;
            proxy_pass $upstream_user;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
        }

        location = /api/users {
            set $upstream_user http://user-service:8082;
            rewrite ^/api/users$ / break;
            proxy_pass $upstream_user;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
        }

        # Scraper Service
        location /api/scraper/ {
            set $upstream_scraper http://scraper-service:8000;
            rewrite ^/api/scraper/?(.*) /$1 break;
            proxy_pass $upstream_scraper;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
        }

        location = /api/scraper {
            set $upstream_scraper http://scraper-service:8000;
            rewrite ^/api/scraper$ / break;
            proxy_pass $upstream_scraper;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
        }
    }
}
