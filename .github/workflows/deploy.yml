name: Deploy to Production

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script_stop: true
          command_timeout: 10m
          script: |
            set -e
            cd /root/RealStream
            git pull origin main

            # Rebuild backend services first (not nginx)
            docker compose -f docker-compose.prod.yml up -d --build \
              postgres mongo \
              auth-service user-service content-service comment-service interaction-service \
              scraper-service frontend

            # Wait for content-service health check (critical for scraper)
            echo "Waiting for services to be healthy..."
            for i in $(seq 1 30); do
              if docker compose -f docker-compose.prod.yml ps content-service | grep -q healthy; then
                echo "content-service healthy after ${i}s"
                break
              fi
              sleep 2
            done

            # Reload nginx config (bind-mounted, so just reload — no rebuild needed)
            # Dynamic DNS resolver in nginx.conf prevents stale IP issues
            docker exec realstream-nginx-1 nginx -t && \
              docker exec realstream-nginx-1 nginx -s reload
            sleep 2

            # Verify
            HTTP_CODE=$(curl -s -o /dev/null -w '%{http_code}' http://localhost || echo "000")
            echo "Deployed at $(date) - HTTP status: $HTTP_CODE"
