<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8B5CF6"/>
      <stop offset="50%" stop-color="#6D28D9"/>
      <stop offset="100%" stop-color="#4C1D95"/>
    </linearGradient>
    <linearGradient id="play" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#E0D4F7"/>
    </linearGradient>
    <linearGradient id="stream" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#A78BFA" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#C4B5FD"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect width="512" height="512" rx="96" ry="96" fill="url(#bg)"/>
  <!-- Video frame / rounded rectangle screen -->
  <rect x="96" y="128" width="320" height="256" rx="24" ry="24" fill="none" stroke="url(#stream)" stroke-width="16"/>
  <!-- Play triangle -->
  <polygon points="224,192 224,320 336,256" fill="url(#play)"/>
  <!-- Streaming lines (bottom right corner - signal waves) -->
  <path d="M380,340 Q420,320 400,280" fill="none" stroke="#C4B5FD" stroke-width="10" stroke-linecap="round" opacity="0.7"/>
  <path d="M396,352 Q444,328 420,272" fill="none" stroke="#C4B5FD" stroke-width="8" stroke-linecap="round" opacity="0.5"/>
  <path d="M412,364 Q468,336 440,264" fill="none" stroke="#C4B5FD" stroke-width="6" stroke-linecap="round" opacity="0.3"/>
</svg>
